name: Android CI (Generate APK)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate and Place Dummy Keystore
      run: |
        # Ye command direct root par aur app folder dono jagah fake key generate karegi taaki gradle dhund le
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        mkdir -p app
        cp debug.keystore app/debug.keystore

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build with Gradle (Force Compiling)
      run: |
        gradle assembleDebug \
          --no-daemon \
          --no-configuration-cache \
          -Djava.awt.headless=true \
          -Pkotlin.ksp.blockOtherCompilerPlugins=false \
          -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/debug.keystore" \
          -Pandroid.injected.signing.store.password="android" \
          -Pandroid.injected.signing.key.alias="androiddebugkey" \
          -Pandroid.injected.signing.key.password="android"
          
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NDA-AI-App-Debug
        path: "**/build/outputs/apk/debug/*-debug.apk"
        
