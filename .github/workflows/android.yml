name: Android CI (Generate APK)

on:
  push:
    branches: [ "main" ] # Agar aapki branch ka naam 'master' hai toh yahan master likhein
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle (Assemble Debug APK)
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NDA-AI-App-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
